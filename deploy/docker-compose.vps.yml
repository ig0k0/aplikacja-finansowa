# VPS: aplikacja za Caddy (HTTPS). Uruchom: docker compose -f deploy/docker-compose.vps.yml up -d
# Wymaga: .env z SESSION_SECRET, COOKIE_SECURE=1, TRUST_PROXY=1

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      DATABASE_URL: /app/data/app.db
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-1}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX:-8}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
      BACKUP_DESTINATION: /app/backups
      AI_MODE: ${AI_MODE:-disabled}
    volumes:
      - app-data:/app/data
      - ../backups:/app/backups
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  app-data:
  caddy-data:
  caddy-config:
